name: Build PlugHub Package

on:
  push:
    branches:
      - main
      - codex
      - hermes
    tags:
      - "V*"
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional explicit version tag, for example V1.2.3. Leave empty to auto-increment."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build package DLLs
    runs-on: windows-latest
    outputs:
      version_tag: ${{ steps.version.outputs.version_tag }}

    steps:
      - name: Checkout package repository
        uses: actions/checkout@v4
        with:
          path: PlugHub_Packages
          fetch-depth: 0

      - name: Checkout PlugHub contracts
        uses: actions/checkout@v4
        with:
          repository: GaoMengGu/PlugHub
          path: revittool

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build package DLLs
        shell: pwsh
        working-directory: PlugHub_Packages
        run: .\build.ps1 -UseRevitApiNuGet

      - name: Resolve package version
        id: version
        if: github.event_name != 'pull_request' && github.actor != 'github-actions[bot]'
        shell: pwsh
        working-directory: PlugHub_Packages
        run: |
          function Normalize-VersionTag {
            param([string]$Value)

            $text = $Value.Trim()
            if ([string]::IsNullOrWhiteSpace($text)) {
              return ""
            }

            if (!$text.StartsWith("V") -and !$text.StartsWith("v")) {
              $text = "V$text"
            }

            if ($text -notmatch '^[Vv]\d+\.\d+\.\d+$') {
              throw "Version must match V<major>.<minor>.<patch>: $Value"
            }

            return "V$($text.Substring(1))"
          }

          function Convert-VersionTag {
            param([string]$Value)

            return [version]$Value.Substring(1)
          }

          $declaredVersion = ""
          if ("${{ github.ref_type }}" -eq "tag") {
            $declaredVersion = "${{ github.ref_name }}"
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $declaredVersion = "${{ github.event.inputs.version }}"
          }

          $versionTag = Normalize-VersionTag $declaredVersion
          if ([string]::IsNullOrWhiteSpace($versionTag)) {
            git fetch origin --tags --force

            $manifest = Get-Content -Raw -Encoding UTF8 -LiteralPath "packages.json" | ConvertFrom-Json
            $manifestVersion = Normalize-VersionTag $manifest.indexVersion
            $tagVersions = New-Object System.Collections.Generic.List[string]

            git tag --list "V*" | ForEach-Object {
              $rawTag = $_.Trim()
              if ($rawTag -match '^[Vv]\d+\.\d+\.\d+$') {
                $tagVersions.Add((Normalize-VersionTag $rawTag))
              }
            }

            if ($tagVersions.Count -eq 0) {
              $versionTag = if ([string]::IsNullOrWhiteSpace($manifestVersion)) { "V1.0.0" } else { $manifestVersion }
            } else {
              $latestTagVersion = $tagVersions |
                Sort-Object { Convert-VersionTag $_ } |
                Select-Object -Last 1
              $latestTag = Convert-VersionTag $latestTagVersion
              $manifestSemVer = if ([string]::IsNullOrWhiteSpace($manifestVersion)) { $null } else { Convert-VersionTag $manifestVersion }

              if ($manifestSemVer -ne $null -and $manifestSemVer.CompareTo($latestTag) -gt 0) {
                $versionTag = $manifestVersion
              } else {
                $versionTag = "V{0}.{1}.{2}" -f $latestTag.Major, $latestTag.Minor, ($latestTag.Build + 1)
              }
            }
          }

          $version = $versionTag.Substring(1)
          $manifestText = Get-Content -Raw -Encoding UTF8 -LiteralPath "packages.json"
          if ($manifestText -notmatch '"indexVersion"\s*:\s*"[^"]+"') {
            throw "packages.json must contain a root indexVersion field."
          }

          $indexVersionPattern = [regex]::new('"indexVersion"\s*:\s*"[^"]+"')
          $manifestText = $indexVersionPattern.Replace($manifestText, ('"indexVersion": "{0}"' -f $versionTag), 1)
          Set-Content -LiteralPath "packages.json" -Value $manifestText -Encoding UTF8 -NoNewline

          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_VERSION_TAG=$versionTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_ZIP=PlugHub-Packages-$versionTag.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version_tag=$versionTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Verify manifest DLL paths
        shell: pwsh
        working-directory: PlugHub_Packages
        run: |
          $manifest = Get-Content -Raw packages.json | ConvertFrom-Json
          $missing = New-Object System.Collections.Generic.List[string]

          foreach ($module in $manifest.modules) {
            if (![string]::IsNullOrWhiteSpace($module.assembly) -and !(Test-Path -LiteralPath $module.assembly)) {
              $missing.Add($module.assembly)
            }
          }

          $missing = $missing | Sort-Object -Unique
          if ($missing.Count -gt 0) {
            throw "Manifest references missing DLLs: $($missing -join ', ')"
          }

      - name: Validate package metadata
        shell: pwsh
        working-directory: PlugHub_Packages
        run: .\tests\Validate-Package.ps1

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: plughub-package
          if-no-files-found: error
          path: |
            PlugHub_Packages/packages.json
            PlugHub_Packages/dist/*.dll
            PlugHub_Packages/icons/*.png

      - name: Package release zip
        if: github.event_name != 'pull_request' && github.actor != 'github-actions[bot]'
        shell: pwsh
        working-directory: PlugHub_Packages
        run: |
          $packageRoot = Join-Path "release" "PlugHub_Packages"
          if (Test-Path -LiteralPath "release") {
            Remove-Item -LiteralPath "release" -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path (Join-Path $packageRoot "dist") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $packageRoot "icons") | Out-Null
          Copy-Item -LiteralPath "packages.json" -Destination $packageRoot -Force
          Get-ChildItem -LiteralPath "dist" -Filter "*.dll" -File | Copy-Item -Destination (Join-Path $packageRoot "dist") -Force
          Get-ChildItem -LiteralPath "icons" -Filter "*.png" -File | Copy-Item -Destination (Join-Path $packageRoot "icons") -Force
          Compress-Archive -Path $packageRoot -DestinationPath $env:PACKAGE_ZIP -Force

      - name: Commit package outputs
        if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        shell: pwsh
        working-directory: PlugHub_Packages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages.json dist/*.dll icons/*.png

          if ((git status --porcelain) -ne "") {
            git commit -m "chore: update package build $env:PACKAGE_VERSION_TAG"
            git push
          }

      - name: Publish GitHub release
        if: github.event_name != 'pull_request' && github.actor != 'github-actions[bot]'
        shell: pwsh
        working-directory: PlugHub_Packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { $env:PACKAGE_VERSION_TAG }
          $title = "PlugHub Packages $env:PACKAGE_VERSION_TAG"
          $notesPath = "release-notes.md"
          $releaseTarget = (git rev-parse HEAD).Trim()

          @"
          PlugHub 外部插件包发布包。

          版本：$env:PACKAGE_VERSION_TAG

          安装方式：
          1. 下载并解压 $env:PACKAGE_ZIP。
          2. 将解压得到的 PlugHub_Packages 文件夹放入 PlugHub 的 packages/dropins 目录。
          3. 重启 Revit 或重新加载 PlugHub。

          也可以在 PlugHub 的 config\sources.json 中配置 Gitee 来源 https://gitee.com/GaoMengGu/PlugHub_Packages，或配置 GitHub 来源 GaoMengGu/PlugHub_Packages。
          "@ | Set-Content -LiteralPath $notesPath -Encoding UTF8

          if ("${{ github.ref_type }}" -ne "tag") {
            git tag -f $tagName $releaseTarget
            git push origin "refs/tags/$tagName" --force
          }

          gh release view $tagName *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            gh release upload $tagName $env:PACKAGE_ZIP --clobber
            gh release edit $tagName --title $title --notes-file $notesPath --target $releaseTarget
          } else {
            gh release create $tagName $env:PACKAGE_ZIP --title $title --notes-file $notesPath --target $releaseTarget
          }

  mirror-gitee:
    name: Mirror final refs and release to Gitee
    needs: build
    if: github.event_name != 'pull_request' && github.actor != 'github-actions[bot]' && needs.build.outputs.version_tag != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch final GitHub refs
        run: |
          set -euo pipefail

          git fetch origin +refs/heads/main:refs/remotes/origin/main --tags --force
          version_tag="${{ needs.build.outputs.version_tag }}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            git checkout -B main origin/main
          else
            git checkout --detach "refs/tags/$version_tag"
          fi

      - name: Configure SSH for Gitee
        env:
          GITEE_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
        run: |
          set -euo pipefail

          test -n "$GITEE_PRIVATE_KEY"
          test -n "$GITEE_TOKEN"
          test -n "$GITEE_USER"

          mkdir -p ~/.ssh
          printf '%s\n' "$GITEE_PRIVATE_KEY" > ~/.ssh/gitee_key
          chmod 600 ~/.ssh/gitee_key
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'EOF'
          Host gitee.com
            HostName gitee.com
            User git
            IdentityFile ~/.ssh/gitee_key
            IdentitiesOnly yes
          EOF

          git config user.name "${GITEE_USER:-github-actions[bot]}"
          git config user.email "${GITEE_USER:-github-actions[bot]}@users.noreply.github.com"

      - name: Push final refs to Gitee
        run: |
          set -euo pipefail

          git remote add gitee git@gitee.com:GaoMengGu/PlugHub_Packages.git

          version_tag="${{ needs.build.outputs.version_tag }}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            git push --force gitee origin/main:refs/heads/main
          fi

          if [ -n "$version_tag" ] && git rev-parse -q --verify "refs/tags/$version_tag" >/dev/null; then
            git push --force gitee "refs/tags/$version_tag:refs/tags/$version_tag"
          fi

      - name: Sync Gitee release asset
        env:
          GH_TOKEN: ${{ github.token }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail

          command -v curl >/dev/null
          command -v gh >/dev/null
          command -v jq >/dev/null

          version_tag="${{ needs.build.outputs.version_tag }}"
          zip_name="PlugHub-Packages-$version_tag.zip"
          api="https://gitee.com/api/v5/repos/GaoMengGu/PlugHub_Packages"
          target_commitish="main"
          title="PlugHub Packages $version_tag"
          notes_file="gitee-release-notes.md"
          encoded_token="$(jq -rn --arg token "$GITEE_TOKEN" '$token|@uri')"

          fail_gitee() {
            local message="$1"
            local response_file="${2:-}"

            echo "::error title=Gitee release sync::$message"
            if [ -n "$response_file" ] && [ -s "$response_file" ]; then
              cat "$response_file"
            fi
            exit 1
          }

          cat > "$notes_file" <<EOF
          PlugHub 外部插件包发布包。

          版本：$version_tag

          安装方式：
          1. 下载并解压 $zip_name。
          2. 将解压得到的 PlugHub_Packages 文件夹放入 PlugHub 的 packages/dropins 目录。
          3. 重启 Revit 或重新加载 PlugHub。

          也可以在 PlugHub 的 config\sources.json 中配置 Gitee 来源 GaoMengGu/PlugHub_Packages。
          EOF
          release_body="$(cat "$notes_file")"

          mkdir -p release-sync
          if ! gh release download "$version_tag" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$zip_name" \
            --dir release-sync \
            --clobber; then
            fail_gitee "Failed to download GitHub release asset $zip_name"
          fi
          test -f "release-sync/$zip_name"

          find_gitee_release_id() {
            local tag="$1"
            local releases_response
            local releases_status

            releases_response="$(mktemp)"
            releases_status="$(
              curl -sS -o "$releases_response" -w "%{http_code}" \
                --get \
                --data-urlencode "access_token=$GITEE_TOKEN" \
                --data-urlencode "per_page=100" \
                "$api/releases"
            )"
            if [ "$releases_status" != "200" ]; then
              fail_gitee "Failed to list Gitee releases: HTTP $releases_status" "$releases_response"
            fi

            jq -e . "$releases_response" >/dev/null || fail_gitee "Gitee releases response is not valid JSON" "$releases_response"
            jq -r --arg tag "$tag" '
              def items:
                if type == "array" then .
                elif type == "object" and (.data | type) == "array" then .data
                else [] end;
              [items[] | select((.tag_name // .tagName // "") == $tag) | (.id // .release_id // empty)][0] // empty
            ' "$releases_response"
          }

          release_id="$(find_gitee_release_id "$version_tag")"

          if [ -n "$release_id" ]; then
            update_response="$(mktemp)"
            update_status="$(
              curl -sS -o "$update_response" -w "%{http_code}" \
                -X PATCH "$api/releases/$release_id" \
                --data-urlencode "access_token=$GITEE_TOKEN" \
                --data-urlencode "tag_name=$version_tag" \
                --data-urlencode "name=$title" \
                --data-urlencode "body=$release_body" \
                --data-urlencode "prerelease=false"
            )"
            if [ "$update_status" != "200" ]; then
              fail_gitee "Failed to update Gitee release $version_tag: HTTP $update_status" "$update_response"
            fi
          else
            create_response="$(mktemp)"
            create_status="$(
              curl -sS -o "$create_response" -w "%{http_code}" \
                -X POST "$api/releases" \
                --data-urlencode "access_token=$GITEE_TOKEN" \
                --data-urlencode "tag_name=$version_tag" \
                --data-urlencode "name=$title" \
                --data-urlencode "body=$release_body" \
                --data-urlencode "target_commitish=$target_commitish" \
                --data-urlencode "prerelease=false"
            )"
            if [ "$create_status" != "200" ] && [ "$create_status" != "201" ]; then
              fail_gitee "Failed to create Gitee release $version_tag: HTTP $create_status" "$create_response"
            fi
            release_id="$(jq -r '.id // .release_id // empty' "$create_response")"
            if [ -z "$release_id" ]; then
              release_id="$(find_gitee_release_id "$version_tag")"
            fi
          fi

          if [ -z "$release_id" ] || [ "$release_id" = "null" ]; then
            fail_gitee "Could not resolve Gitee release id for $version_tag"
          fi

          attachments_response="$(mktemp)"
          attachments_status="$(
            curl -sS -o "$attachments_response" -w "%{http_code}" \
              --get \
              --data-urlencode "access_token=$GITEE_TOKEN" \
              --data-urlencode "per_page=100" \
              "$api/releases/$release_id/attach_files"
          )"
          if [ "$attachments_status" != "200" ]; then
            fail_gitee "Failed to list Gitee release attachments for $version_tag: HTTP $attachments_status" "$attachments_response"
          fi

          jq -r --arg name "$zip_name" '
            def items:
              if type == "array" then .
              elif type == "object" and (.attach_files | type) == "array" then .attach_files
              elif type == "object" and (.data | type) == "array" then .data
              else [] end;
            items[] | select((.name // .filename // .file_name // .path // "") == $name) | .id
          ' "$attachments_response" |
            while read -r attachment_id; do
              if [ -n "$attachment_id" ] && [ "$attachment_id" != "null" ]; then
                delete_response="$(mktemp)"
                delete_status="$(
                  curl -sS -o "$delete_response" -w "%{http_code}" \
                    -X DELETE \
                    "$api/releases/$release_id/attach_files/$attachment_id?access_token=$encoded_token"
                )"
                if [ "$delete_status" != "200" ] && [ "$delete_status" != "204" ]; then
                  fail_gitee "Failed to delete existing Gitee release attachment $attachment_id: HTTP $delete_status" "$delete_response"
                fi
              fi
            done

          upload_response="$(mktemp)"
          upload_status="$(
            curl -sS -o "$upload_response" -w "%{http_code}" \
              -X POST "$api/releases/$release_id/attach_files?access_token=$encoded_token" \
              -F "file=@release-sync/$zip_name"
          )"
          if [ "$upload_status" != "200" ] && [ "$upload_status" != "201" ]; then
            fail_gitee "Failed to upload $zip_name to Gitee release $version_tag: HTTP $upload_status" "$upload_response"
          fi

          jq -e . "$upload_response" >/dev/null || fail_gitee "Gitee attachment upload response is not valid JSON" "$upload_response"
