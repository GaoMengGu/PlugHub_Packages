name: Build PlugHub Package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build package DLLs
    runs-on: windows-latest

    steps:
      - name: Checkout package repository
        uses: actions/checkout@v4
        with:
          path: PlugHub_Packages
          fetch-depth: 0

      - name: Checkout PlugHub contracts
        uses: actions/checkout@v4
        with:
          repository: GaoMengGu/PlugHub
          path: revittool

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build package DLLs
        shell: pwsh
        working-directory: PlugHub_Packages
        run: .\build.ps1 -UseRevitApiNuGet

      - name: Verify manifest DLL paths
        shell: pwsh
        working-directory: PlugHub_Packages
        run: |
          $manifest = Get-Content -Raw package.json | ConvertFrom-Json
          $missing = New-Object System.Collections.Generic.List[string]

          foreach ($module in $manifest.modules) {
            if (![string]::IsNullOrWhiteSpace($module.assembly) -and !(Test-Path -LiteralPath $module.assembly)) {
              $missing.Add($module.assembly)
            }

            foreach ($feature in $module.features) {
              if (![string]::IsNullOrWhiteSpace($feature.commandAssembly) -and !(Test-Path -LiteralPath $feature.commandAssembly)) {
                $missing.Add($feature.commandAssembly)
              }
            }
          }

          $missing = $missing | Sort-Object -Unique
          if ($missing.Count -gt 0) {
            throw "Manifest references missing DLLs: $($missing -join ', ')"
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: plughub-package
          if-no-files-found: error
          path: |
            PlugHub_Packages/package.json
            PlugHub_Packages/dist/*.dll

      - name: Package release zip
        if: github.event_name != 'pull_request' && github.actor != 'github-actions[bot]'
        shell: pwsh
        working-directory: PlugHub_Packages
        run: |
          $versionTag = if ("${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}"
          } else {
            "v0.0.${{ github.run_number }}"
          }
          $version = if ($versionTag.StartsWith("v")) { $versionTag.Substring(1) } else { $versionTag }
          $zipName = "PlugHub-Packages-$versionTag.zip"

          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_VERSION_TAG=$versionTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_ZIP=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $packageRoot = Join-Path "release" "PlugHub_Packages"
          if (Test-Path -LiteralPath "release") {
            Remove-Item -LiteralPath "release" -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path (Join-Path $packageRoot "dist") | Out-Null
          Copy-Item -LiteralPath "package.json" -Destination $packageRoot -Force
          Get-ChildItem -LiteralPath "dist" -Filter "*.dll" -File | Copy-Item -Destination (Join-Path $packageRoot "dist") -Force
          Compress-Archive -Path $packageRoot -DestinationPath $zipName -Force

      - name: Commit dist DLLs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        working-directory: PlugHub_Packages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/*.dll

          if ((git status --porcelain) -ne "") {
            git commit -m "chore: update package binaries"
            git push
          }

      - name: Publish GitHub release
        if: github.event_name != 'pull_request' && github.actor != 'github-actions[bot]'
        shell: pwsh
        working-directory: PlugHub_Packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "latest" }
          $title = if ("${{ github.ref_type }}" -eq "tag") { "PlugHub Packages $env:PACKAGE_VERSION_TAG" } else { "PlugHub Packages $env:PACKAGE_VERSION_TAG (latest)" }
          $notesPath = "release-notes.md"
          $releaseTarget = (git rev-parse HEAD).Trim()

          @"
          PlugHub 外部插件包发布包。

          版本：$env:PACKAGE_VERSION_TAG

          安装方式：
          1. 下载并解压 $env:PACKAGE_ZIP。
          2. 将解压得到的 PlugHub_Packages 文件夹放入 PlugHub 的 packages/dropins 目录。
          3. 重启 Revit 或重新加载 PlugHub。

          也可以在 PlugHub 的 config\sources.json 中配置 GitHub 来源 GaoMengGu/PlugHub_Packages。
          "@ | Set-Content -LiteralPath $notesPath -Encoding UTF8

          if ("${{ github.ref_type }}" -ne "tag") {
            git tag -f $tagName $releaseTarget
            git push origin "refs/tags/$tagName" --force
          }

          gh release view $tagName *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            if ($tagName -eq "latest") {
              $assetNames = gh release view $tagName --json assets --jq ".assets[].name"
              foreach ($assetName in $assetNames) {
                if ($assetName -like "PlugHub-Packages-v*.zip") {
                  gh release delete-asset $tagName $assetName --yes
                }
              }
            }

            gh release upload $tagName $env:PACKAGE_ZIP --clobber
            gh release edit $tagName --title $title --notes-file $notesPath --latest
          } else {
            gh release create $tagName $env:PACKAGE_ZIP --title $title --notes-file $notesPath --latest --target $releaseTarget
          }
